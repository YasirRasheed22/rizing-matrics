<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Ringnex (Beta)</title>
  <link rel="preconnect" href="" crossorigin />
  <style>
    body {
      margin: 0;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .ringnex-spinner {
      width: 60px;
      height: 60px;
      border: 6px solid #f3f4f6;
      border-top: 6px solid #2094fd;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }

    .container {
      text-align: center;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 3px;
      color: #4f46e5;
      margin-bottom: 20px;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border: 4px solid rgba(79,70,229,0.15);
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="images/AIO.png" width="150" height="auto"/>
    <div class="logo">Ringnex (Beta)</div>
    <div class="ringnex-spinner"></div>
  </div>
</body>
</html>
