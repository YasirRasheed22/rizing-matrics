<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incoming Call</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            ring: 'ring 1.5s ease-in-out infinite',
          },
          keyframes: {
            ring: {
            '0%, 100%': { transform: 'scale(1)' },
            '50%': { transform: 'scale(1.05)' },
          }
        }
      }
    }
}
  </script>
  <style>
    body { margin: 0; height: 100vh; overflow: hidden; background: #fff; }
    .pulse-ring {
      animation: ring 1.5s ease-in-out infinite;
    }
  </style>
</head>
<body class="flex items-center justify-center bg-gradient-to-br from-amber-600 to-amber-800">
  <div class="w-80 h-full max-w-full bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col">
    <!-- Header / Drag (optional) -->
    <div class="h-12 bg-amber-700 flex items-center justify-center text-white font-medium">
      Incoming Call
    </div>

    <!-- Avatar + Name -->
    <div class="flex-1 flex flex-col items-center justify-center px-6">
      <div class="w-32 h-32 rounded-full bg-white shadow-2xl flex items-center justify-center border-8 border-white pulse-ring">
        <span id="initials" class="text-6xl font-bold text-amber-700">U</span>
      </div>
      <h2 id="callerName" class="text-2xl font-bold text-gray-900 mt-8">Unknown</h2>
      <p id="callerNumber" class="text-xl font-mono text-gray-600 mt-2">+1 555 000 0000</p>
      <p id="transferInfo" class="text-sm text-amber-700 font-medium mt-4 hidden">
        Transferred call
      </p>
    </div>

    <!-- Buttons -->
    <div class="p-8 flex justify-center gap-16">
      <button id="declineBtn" class="w-20 h-20 rounded-full bg-red-600 hover:bg-red-700 active:scale-95 transition-all shadow-xl flex items-center justify-center">
        <svg class="w-10 h-10 text-white rotate-135" fill="currentColor" viewBox="0 0 24 24">
          <path d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>

      <button id="acceptBtn" class="w-20 h-20 rounded-full bg-green-600 hover:bg-green-700 active:scale-95 transition-all shadow-xl flex items-center justify-center">
        <svg class="w-10 h-10 text-white" fill="currentColor" viewBox="0 0 24 24">
          <path d="M20.3 3.7a1 1 0 00-1.3.1l-7 6.5a1 1 0 000 1.4l7 6.5a1 1 0 001.3.1 10 10 0 10-13.6 0 1 1 0 001.3-.1l7-6.5a1 1 0 000-1.4l-7-6.5a1 1 0 00-1.3-.1 10 10 0 100 17.4 10 10 0 0013.6 0 1 1 0 000-1.4z"/>
        </svg>
      </button>
    </div>

    <div class="text-center text-gray-600 pb-6">
      <span class="text-sm">Decline</span>
      <span class="ml-24 text-sm">Answer</span>
    </div>
  </div>

  <audio id="ringtone" loop>
    <source src="/sounds/ringtone.mp3" type="audio/mpeg" />
  </audio>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const callData = {
      from: urlParams.get('from') || '',
      name: urlParams.get('name') || 'Unknown Caller',
      isTransfer: urlParams.get('transfer') === 'true',
      transferFrom: urlParams.get('fromAgent') || '',
      callSid: urlParams.get('sid') || '',
    };

    document.getElementById('callerName').textContent = callData.name;
    document.getElementById('callerNumber').textContent = callData.from;
    document.getElementById('initials').textContent = 
      callData.name.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase() || 'U';

    if (callData.isTransfer && callData.transferFrom) {
      document.getElementById('transferInfo').textContent = 
        `Transferred from Agent ${callData.transferFrom}`;
      document.getElementById('transferInfo').classList.remove('hidden');
    }

    // Start ringing
    document.getElementById('ringtone')?.play().catch(() => {});

    // Send response back to parent
    const sendResponse = (action) => {
      window.opener?.postMessage({
        type: 'CALL_RESPONSE',
        action,
        callSid: callData.callSid
      }, '*');
      window.close();
    };

    document.getElementById('acceptBtn').onclick = () => sendResponse('accept');
    document.getElementById('declineBtn').onclick = () => sendResponse('reject');
  </script>
</body>
</html>
